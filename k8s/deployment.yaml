apiVersion: apps/v1
kind: Deployment
metadata:
  name: brainboost
spec:
  replicas: 3
  selector:
    matchLabels:
      app: brainboost
  template:
    metadata:
      labels:
        app: brainboost
    spec:
      containers:
      - name: brainboost
        image: puriicyber/brainboost:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: brainboost-service
spec:
  selector:
    app: brainboost
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
  type: NodePort
