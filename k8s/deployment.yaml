apiVersion: apps/v1
kind: Deployment
metadata:
  name: brainboost
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: brainboost
  template:
    metadata:
      labels:
        app: brainboost
      annotations:
        rollout: "2026-04-15"
    spec:
      containers:
      - name: brainboost
        image: puriicyber/brainboost:66c7c86b2d4414f9050f50ca1f366323249acc0c
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: brainboost-service
  namespace: default
spec:
  selector:
    app: brainboost
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
  type: NodePort
